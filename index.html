<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蝦皮直播效益計算器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e1f22;
    --bg4: #26272b;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0ee;
    --text2: #9a9994;
    --text3: #5e5d59;
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --green-dim2: rgba(62,207,142,0.06);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.12);
    --blue: #5b9cf6;
    --blue-dim: rgba(91,156,246,0.12);
    --red: #f06565;
    --red-dim: rgba(240,101,101,0.12);
    --purple: #a78bfa;
    --pre-color: #5b9cf6;
    --live-color: #3ecf8e;
    --font-body: 'Noto Sans TC', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }
  ::selection { background: rgba(62,207,142,0.25); }

  /* ─── LAYOUT ─── */
  .app-wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px 60px; }

  /* ─── HEADER ─── */
  .header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon {
    width: 42px; height: 42px;
    background: var(--green-dim);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: var(--font-mono); }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 4px;
    margin-bottom: 28px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    border-radius: 9px;
    transition: all 0.15s;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--bg4); color: var(--text); }
  .tab-pre.active { color: var(--pre-color); }
  .tab-live.active { color: var(--live-color); }
  .tab-compare.active { color: var(--amber); }

  /* ─── PAGE ─── */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── CARDS ─── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 16px;
    font-family: var(--font-mono);
  }

  /* ─── GRID ─── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 700px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
  }

  /* ─── FORM FIELDS ─── */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .field input {
    font-size: 15px;
    font-weight: 500;
    font-family: var(--font-mono);
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg3);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus { outline: none; border-color: rgba(62,207,142,0.4); }
  .field input:hover { border-color: var(--border2); }
  .field input[readonly] {
    background: var(--bg);
    color: var(--text2);
    border-color: var(--border);
    cursor: default;
  }
  .field input[readonly]:focus { border-color: var(--border); }
  .field .auto-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); margin-top: 2px; }

  /* ─── FUNNEL ─── */
  .funnel { display: flex; flex-direction: column; gap: 0; }
  .funnel-step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .funnel-step:last-child { border-bottom: none; }
  .funnel-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .funnel-num {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--font-mono);
    min-width: 90px;
    letter-spacing: -0.02em;
  }
  .funnel-info-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .funnel-info-sub { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 1px; }
  .funnel-arrow {
    margin-left: auto;
    font-size: 18px;
    color: var(--text3);
  }

  /* ─── METRICS ─── */
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { color: var(--text2); }
  .metric-value { font-weight: 500; font-family: var(--font-mono); }
  .c-green { color: var(--green); }
  .c-amber { color: var(--amber); }
  .c-red { color: var(--red); }
  .c-blue { color: var(--blue); }

  /* ─── STAT CHIPS ─── */
  .stat-chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-chip-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-chip-value { font-size: 18px; font-weight: 700; font-family: var(--font-mono); margin-top: 4px; letter-spacing: -0.02em; }
  @media (max-width: 700px) { .stat-chips { grid-template-columns: 1fr 1fr; } }

  /* ─── DISTRIBUTION ─── */
  .dist-rows { display: flex; flex-direction: column; gap: 12px; }
  .dist-row { display: flex; align-items: center; gap: 10px; }
  .dist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dist-label { font-size: 12px; color: var(--text2); min-width: 76px; }
  .dist-track {
    flex: 1;
    height: 5px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
  }
  .dist-bar { height: 100%; border-radius: 3px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }
  .dist-pct-input {
    width: 56px;
    font-size: 12px;
    font-family: var(--font-mono);
    font-weight: 500;
    padding: 4px 8px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--bg3);
    color: var(--text);
    text-align: right;
  }
  .dist-pct-input:focus { outline: none; border-color: rgba(62,207,142,0.4); }
  .dist-amount { font-size: 12px; font-family: var(--font-mono); font-weight: 500; min-width: 72px; text-align: right; color: var(--text); }
  .dist-total-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .dist-total-label { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .dist-total-val {
    font-size: 12px;
    font-weight: 700;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: 6px;
  }
  .total-ok { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .total-err { background: var(--red-dim); color: var(--red); border: 1px solid rgba(240,101,101,0.2); }

  /* ─── TYPE BADGE ─── */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 18px;
    letter-spacing: 0.03em;
  }
  .badge-pre { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(91,156,246,0.2); }
  .badge-live { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; display: inline-block; }

  /* ─── COMPARE ─── */
  .compare-grid-wrap { display: grid; gap: 12px; margin-bottom: 14px; }
  .compare-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    transition: border-color 0.15s;
  }
  .compare-card.best { border-color: rgba(62,207,142,0.35); }
  .best-badge {
    display: inline-block;
    font-size: 10px;
    font-family: var(--font-mono);
    font-weight: 500;
    padding: 2px 8px;
    background: var(--green-dim);
    color: var(--green);
    border-radius: 99px;
    margin-bottom: 8px;
    border: 1px solid rgba(62,207,142,0.2);
  }
  .compare-card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .compare-card-type { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-bottom: 14px; }
  .compare-stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .compare-stat:last-child { border-bottom: none; }
  .compare-stat-label { color: var(--text3); }
  .compare-stat-val { font-family: var(--font-mono); font-weight: 500; }

  /* ─── DISTRIBUTION TABLE ─── */
  .dist-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dist-table th {
    text-align: right;
    padding: 8px 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }
  .dist-table th:first-child { text-align: left; }
  .dist-table td {
    text-align: right;
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--text);
  }
  .dist-table td:first-child { text-align: left; color: var(--text2); font-family: var(--font-body); }
  .dist-table tr:last-child td { border-bottom: none; }
  .dist-table .pct-row td { color: var(--text3); font-size: 11px; padding-top: 2px; padding-bottom: 8px; }
  .dist-table .pct-row td:first-child { color: var(--text3); }

  /* ─── CHECKBOXES ─── */
  .cmp-options { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .cmp-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    user-select: none;
  }
  .cmp-label:hover { color: var(--text); }
  .cmp-label input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--green); cursor: pointer; }
  .cmp-label.pre-type input { accent-color: var(--blue); }

  /* ─── SEPARATOR ─── */
  .sep { height: 1px; background: var(--border); margin: 4px 0 20px; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
</style>
</head>
<body>
<div class="app-wrap">

  <div class="header">
    <div class="header-left">
      <div class="header-icon">📡</div>
      <div>
        <h1>蝦皮直播效益計算器</h1>
        <div class="header-sub">Shopee Livestream ROI Calculator</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab tab-pre active" onclick="switchPage('pre',this)">預錄直播</button>
    <button class="tab tab-live" onclick="switchPage('live',this)">正式直播</button>
    <button class="tab tab-compare" onclick="switchPage('compare',this)">比較頁面</button>
  </div>

  <!-- ═══ PRE ═══ -->
  <div id="page-pre" class="page active">
    <span class="type-badge badge-pre"><span class="badge-dot"></span>預錄直播</span>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">廣告數據</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="field"><label>廣告實際花費（元）</label><input type="number" id="pre-adspend" value="5000" oninput="calc('pre')"></div>
          <div class="field"><label>廣告費佔整體營收比例（%）</label><input type="number" id="pre-adpct" readonly><span class="auto-label">自動計算：實際花費 ÷ 總營收</span></div>
          <div class="field"><label>報名總人數</label><input type="number" id="pre-signups" value="33" oninput="calc('pre')"></div>
          <div class="field"><label>每個名單成本 CPL（元）</label><input type="number" id="pre-cpl" readonly><span class="auto-label">自動計算：實際花費 ÷ 總人數</span></div>
          <div class="field"><label>總營收（元）</label><input type="number" id="pre-revenue" value="25000" oninput="calc('pre')"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">漏斗參數</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="field"><label>上線率（%）</label><input type="number" id="pre-showrate" value="40" step="0.1" oninput="calc('pre')"></div>
          <div class="field"><label>進轉單人數比率（%）</label><input type="number" id="pre-pitchrate" value="85" step="0.1" oninput="calc('pre')"></div>
          <div class="field"><label>轉換率（%）</label><input type="number" id="pre-convrate" value="12" step="0.1" oninput="calc('pre')"></div>
          <div class="field"><label>課程單價（元）</label><input type="number" id="pre-price" value="19800" oninput="calc('pre')"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">漏斗預估流程</div>
      <div id="pre-funnel" class="funnel"></div>
    </div>

    <div class="stat-chips" id="pre-chips"></div>

    <div class="card">
      <div class="card-title">效益總覽</div>
      <div id="pre-summary"></div>
    </div>

    <div class="card">
      <div class="card-title">營收分配比例</div>
      <div id="pre-dist" class="dist-rows"></div>
      <div class="dist-total-row">
        <span class="dist-total-label">合計</span>
        <span id="pre-total-badge" class="dist-total-val total-ok">100%</span>
      </div>
    </div>
  </div>

  <!-- ═══ LIVE ═══ -->
  <div id="page-live" class="page">
    <span class="type-badge badge-live"><span class="badge-dot"></span>正式直播</span>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">廣告數據</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="field"><label>廣告實際花費（元）</label><input type="number" id="live-adspend" value="8000" oninput="calc('live')"></div>
          <div class="field"><label>廣告費佔整體營收比例（%）</label><input type="number" id="live-adpct" readonly><span class="auto-label">自動計算：實際花費 ÷ 總營收</span></div>
          <div class="field"><label>報名總人數</label><input type="number" id="live-signups" value="50" oninput="calc('live')"></div>
          <div class="field"><label>每個名單成本 CPL（元）</label><input type="number" id="live-cpl" readonly><span class="auto-label">自動計算：實際花費 ÷ 總人數</span></div>
          <div class="field"><label>總營收（元）</label><input type="number" id="live-revenue" value="40000" oninput="calc('live')"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">漏斗參數</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="field"><label>上線率（%）</label><input type="number" id="live-showrate" value="50" step="0.1" oninput="calc('live')"></div>
          <div class="field"><label>進轉單人數比率（%）</label><input type="number" id="live-pitchrate" value="85" step="0.1" oninput="calc('live')"></div>
          <div class="field"><label>轉換率（%）</label><input type="number" id="live-convrate" value="15" step="0.1" oninput="calc('live')"></div>
          <div class="field"><label>課程單價（元）</label><input type="number" id="live-price" value="19800" oninput="calc('live')"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">漏斗預估流程</div>
      <div id="live-funnel" class="funnel"></div>
    </div>

    <div class="stat-chips" id="live-chips"></div>

    <div class="card">
      <div class="card-title">效益總覽</div>
      <div id="live-summary"></div>
    </div>

    <div class="card">
      <div class="card-title">營收分配比例</div>
      <div id="live-dist" class="dist-rows"></div>
      <div class="dist-total-row">
        <span class="dist-total-label">合計</span>
        <span id="live-total-badge" class="dist-total-val total-ok">100%</span>
      </div>
    </div>
  </div>

  <!-- ═══ COMPARE ═══ -->
  <div id="page-compare" class="page">
    <div class="card">
      <div class="card-title">選擇比較場次</div>
      <div class="cmp-options">
        <label class="cmp-label pre-type"><input type="checkbox" id="cmp-pre" checked onchange="renderCompare()"> 預錄直播</label>
        <label class="cmp-label"><input type="checkbox" id="cmp-live" checked onchange="renderCompare()"> 正式直播</label>
      </div>
    </div>
    <div id="compare-content"></div>
  </div>

</div>

<script>
const DIST_LABELS = ['老師', '行銷團隊', '金流', '團隊分潤', '公司利潤', '廣告費用'];
const DIST_COLORS = ['#5b9cf6', '#3ecf8e', '#f5a623', '#a78bfa', '#f06565', '#888888'];
const state = {
  pre:  { dist: [25, 10, 10, 5, 30, 20] },
  live: { dist: [25, 10, 10, 5, 30, 20] }
};

function v(id) { return parseFloat(document.getElementById(id)?.value) || 0; }
function fmtN(n, d=1) { return parseFloat(n.toFixed(d)); }
function fmtM(n) { return '$' + Math.round(n).toLocaleString('zh-TW'); }
function fmtP(n, d=1) { return fmtN(n, d) + '%'; }

const FUNNEL_CONFIG = [
  { icon:'👥', label:'報名人數', sub: () => '起始人數' },
  { icon:'📲', label:'預估上線人數', subKey: 'showrate', subLabel:'上線率' },
  { icon:'🎯', label:'預估聽到介紹人數', subKey: 'pitchrate', subLabel:'進轉單比率' },
  { icon:'✅', label:'預估報名正課人數', subKey: 'convrate', subLabel:'轉換率' },
  { icon:'💰', label:'預估營收', subKey: 'price', subLabel:'課程單價', isMoney: true }
];

function calc(type) {
  const signups   = v(type+'-signups');
  const showrate  = v(type+'-showrate')  / 100;
  const pitchrate = v(type+'-pitchrate') / 100;
  const convrate  = v(type+'-convrate')  / 100;
  const price     = v(type+'-price');
  const revenue   = v(type+'-revenue');
  const adspend   = v(type+'-adspend');

  // Auto-computed fields
  const adpct = revenue > 0 ? adspend / revenue * 100 : 0;
  const cpl   = signups > 0 ? adspend / signups : 0;
  document.getElementById(type+'-adpct').value = fmtN(adpct, 2);
  document.getElementById(type+'-cpl').value   = Math.round(cpl);

  const online     = Math.floor(signups * showrate);
  const pitched    = Math.floor(online * pitchrate);
  const converted  = Math.floor(pitched * convrate);
  const estRevenue = converted * price;
  const impliedRev = adpct > 0 ? adspend / (adpct / 100) : 0;
  const roi        = adspend > 0 ? (revenue - adspend) / adspend * 100 : 0;
  const roas       = adspend > 0 ? revenue / adspend : 0;

  // Funnel
  const funnelEl = document.getElementById(type+'-funnel');
  const funnelNums = [signups, online, pitched, converted, estRevenue];
  const funnelSubs = [
    '起始人數',
    `× 上線率 ${fmtP(showrate*100)}`,
    `× 進轉單比率 ${fmtP(pitchrate*100)}`,
    `× 轉換率 ${fmtP(convrate*100)}`,
    `× 課程單價 ${fmtM(price)}`
  ];
  const funnelColors = ['#5b9cf6','#5b9cf6','#a78bfa','#f5a623','#3ecf8e'];
  funnelEl.innerHTML = FUNNEL_CONFIG.map((cfg, i) => {
    const num = i === 4 ? fmtM(funnelNums[i]) : Math.floor(funnelNums[i]) + ' 人';
    return `<div class="funnel-step">
      <div class="funnel-icon" style="background:${funnelColors[i]}22;border:1px solid ${funnelColors[i]}33">${cfg.icon}</div>
      <div class="funnel-num" style="color:${funnelColors[i]}">${num}</div>
      <div>
        <div class="funnel-info-title">${cfg.label}</div>
        <div class="funnel-info-sub">${funnelSubs[i]}</div>
      </div>
      ${i < 4 ? '<div class="funnel-arrow">↓</div>' : ''}
    </div>`;
  }).join('');

  // Chips
  const chipsEl = document.getElementById(type+'-chips');
  const roasColor = roas >= 3 ? '#3ecf8e' : roas >= 1 ? '#f5a623' : '#f06565';
  const roiColor  = roi >= 100 ? '#3ecf8e' : roi >= 0 ? '#f5a623' : '#f06565';
  chipsEl.innerHTML = `
    <div class="stat-chip"><div class="stat-chip-label">總營收</div><div class="stat-chip-value" style="color:#3ecf8e">${fmtM(revenue)}</div></div>
    <div class="stat-chip"><div class="stat-chip-label">廣告花費</div><div class="stat-chip-value" style="color:#5b9cf6">${fmtM(adspend)}</div></div>
    <div class="stat-chip"><div class="stat-chip-label">ROAS</div><div class="stat-chip-value" style="color:${roasColor}">${fmtN(roas)}x</div></div>
    <div class="stat-chip"><div class="stat-chip-label">廣告 ROI</div><div class="stat-chip-value" style="color:${roiColor}">${fmtN(roi)}%</div></div>
  `;

  // Summary
  const summaryEl = document.getElementById(type+'-summary');
  summaryEl.innerHTML = [
    ['廣告費佔營收比', fmtP(adpct, 2), ''],
    ['每名單成本 CPL', fmtM(cpl), ''],
    ['漏斗預估轉換人數', converted + ' 人', 'c-blue'],
    ['漏斗預估營收', fmtM(estRevenue), 'c-green'],
    ['實際總營收', fmtM(revenue), 'c-green'],
    ['ROAS（廣告回收倍率）', fmtN(roas) + 'x', roas >= 1 ? 'c-green' : 'c-red'],
    ['廣告 ROI', fmtN(roi) + '%', roi >= 0 ? 'c-green' : 'c-red'],
  ].map(([label, val, cls]) => `
    <div class="metric-row">
      <span class="metric-label">${label}</span>
      <span class="metric-value ${cls}">${val}</span>
    </div>`).join('');

  renderDist(type, revenue);
  renderCompare();
}

function renderDist(type, revenue) {
  const dist = state[type].dist;
  const total = dist.reduce((a, b) => a + b, 0);

  const badge = document.getElementById(type+'-total-badge');
  badge.textContent = fmtP(total);
  badge.className = 'dist-total-val ' + (Math.abs(total - 100) < 0.05 ? 'total-ok' : 'total-err');

  document.getElementById(type+'-dist').innerHTML = DIST_LABELS.map((label, i) => {
    const pct = dist[i];
    const amount = revenue * pct / 100;
    return `<div class="dist-row">
      <div class="dist-dot" style="background:${DIST_COLORS[i]}"></div>
      <span class="dist-label">${label}</span>
      <div class="dist-track"><div class="dist-bar" style="width:${Math.min(pct,100)}%;background:${DIST_COLORS[i]}"></div></div>
      <input class="dist-pct-input" type="number" value="${pct}" step="0.5" min="0" max="100"
        oninput="updateDist('${type}',${i},this.value)">
      <span class="dist-amount">${fmtM(amount)}</span>
    </div>`;
  }).join('');
}

function updateDist(type, idx, val) {
  state[type].dist[idx] = parseFloat(val) || 0;
  const revenue = v(type+'-revenue');
  renderDist(type, revenue);
}

function renderCompare() {
  const showPre  = document.getElementById('cmp-pre')?.checked;
  const showLive = document.getElementById('cmp-live')?.checked;
  const items = [];
  if (showPre)  items.push('pre');
  if (showLive) items.push('live');

  const contentEl = document.getElementById('compare-content');
  if (!contentEl) return;
  if (items.length === 0) {
    contentEl.innerHTML = '<div class="card" style="color:var(--text3);font-size:13px">請至少勾選一個場次</div>';
    return;
  }

  const TYPE_LABEL = { pre: '預錄直播', live: '正式直播' };
  const TYPE_COLOR = { pre: '#5b9cf6', live: '#3ecf8e' };

  function getStats(type) {
    const signups   = v(type+'-signups');
    const showrate  = v(type+'-showrate')  / 100;
    const pitchrate = v(type+'-pitchrate') / 100;
    const convrate  = v(type+'-convrate')  / 100;
    const price     = v(type+'-price');
    const revenue   = v(type+'-revenue');
    const adspend   = v(type+'-adspend');
    const cpl       = signups > 0 ? adspend / signups : 0;
    const converted    = Math.floor(Math.floor(Math.floor(signups * showrate) * pitchrate) * convrate);
    const estRevenue   = converted * price;
    const roi          = adspend > 0 ? (revenue - adspend) / adspend * 100 : 0;
    const roas         = adspend > 0 ? revenue / adspend : 0;
    const netProfit    = revenue - adspend;
    return { signups, revenue, adspend, cpl, converted, estRevenue, roi: fmtN(roi), roas: fmtN(roas), netProfit };
  }

  const allStats = items.map(t => ({ type: t, ...getStats(t) }));
  const maxRevenue = Math.max(...allStats.map(s => s.revenue));

  // Cards
  const gridCols = items.length <= 2 ? items.length : items.length;
  const cards = allStats.map(s => {
    const isBest = s.revenue === maxRevenue && items.length > 1;
    const color = TYPE_COLOR[s.type];
    return `<div class="compare-card ${isBest ? 'best' : ''}">
      ${isBest ? '<div class="best-badge">最高營收</div>' : ''}
      <div class="compare-card-title" style="color:${color}">${TYPE_LABEL[s.type]}</div>
      <div class="compare-card-type">${s.type === 'pre' ? '預錄型' : '正式型'}</div>
      <div class="compare-stat"><span class="compare-stat-label">廣告花費</span><span class="compare-stat-val" style="color:#5b9cf6">${fmtM(s.adspend)}</span></div>
      <div class="compare-stat"><span class="compare-stat-label">報名人數</span><span class="compare-stat-val">${Math.round(s.signups)} 人</span></div>
      <div class="compare-stat"><span class="compare-stat-label">CPL</span><span class="compare-stat-val">${fmtM(s.cpl)}</span></div>
      <div class="compare-stat"><span class="compare-stat-label">預估轉換人數</span><span class="compare-stat-val">${s.converted} 人</span></div>
      <div class="compare-stat"><span class="compare-stat-label">漏斗預估營收</span><span class="compare-stat-val" style="color:#3ecf8e">${fmtM(s.estRevenue)}</span></div>
      <div class="compare-stat"><span class="compare-stat-label">實際總營收</span><span class="compare-stat-val" style="color:#3ecf8e">${fmtM(s.revenue)}</span></div>
      <div class="compare-stat"><span class="compare-stat-label">淨利（扣廣告）</span><span class="compare-stat-val" style="color:${s.netProfit>=0?'#3ecf8e':'#f06565'}">${fmtM(s.netProfit)}</span></div>
      <div class="compare-stat"><span class="compare-stat-label">ROAS</span><span class="compare-stat-val" style="color:${s.roas>=1?'#f5a623':'#f06565'}">${s.roas}x</span></div>
      <div class="compare-stat"><span class="compare-stat-label">廣告 ROI</span><span class="compare-stat-val" style="color:${s.roi>=0?'#3ecf8e':'#f06565'}">${s.roi}%</span></div>
    </div>`;
  }).join('');

  // Distribution table
  const distHeaders = items.map(t => `<th>${TYPE_LABEL[t]}<br><span style="font-weight:400;color:var(--text3)">金額</span></th><th>${TYPE_LABEL[t]}<br><span style="font-weight:400;color:var(--text3)">佔比</span></th>`).join('');
  const distRows = DIST_LABELS.map((label, i) => {
    const cells = items.map(type => {
      const rev = v(type+'-revenue');
      const pct = state[type].dist[i];
      return `<td>${fmtM(rev * pct / 100)}</td><td style="color:var(--text3)">${fmtP(pct)}</td>`;
    }).join('');
    return `<tr>
      <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${DIST_COLORS[i]};margin-right:7px;vertical-align:middle"></span>${label}</td>
      ${cells}
    </tr>`;
  }).join('');

  contentEl.innerHTML = `
    <div class="compare-grid-wrap" style="grid-template-columns:repeat(${gridCols},1fr)">
      ${cards}
    </div>
    <div class="card">
      <div class="card-title">營收分配比較</div>
      <div style="overflow-x:auto">
        <table class="dist-table">
          <thead><tr>
            <th style="text-align:left">項目</th>
            ${distHeaders}
          </tr></thead>
          <tbody>${distRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

// Init
calc('pre');
calc('live');
</script>
</body>
